kind = "web"
previewPath = "/"
title = "Jigsaw Puzzle"
version = "1.0.0"
id = "artifacts/jigsaw-puzzle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21520

[services.development]
run = "pnpm --filter @workspace/jigsaw-puzzle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jigsaw-puzzle", "run", "build" ]
publicDir = "artifacts/jigsaw-puzzle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21520"
BASE_PATH = "/"
